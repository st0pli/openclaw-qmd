name: Build alpine-latest based image

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    env:
      BASE_IMAGE: alpine/openclaw:latest
      TARGET_IMAGE: st0p/openclaw-qmd:alpine-latest
      CACHE_KEY: alpine-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Pull base image and get digest
        id: base_digest
        run: |
          docker pull ${{ env.BASE_IMAGE }}
          DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' ${{ env.BASE_IMAGE }} | cut -d@ -f2)
          echo "digest=$DIGEST" >> $GITHUB_OUTPUT

      - name: Restore cached base digest
        id: cache
        uses: actions/cache@v4
        with:
          path: base_digest_${{ env.CACHE_KEY }}.txt
          key: base-digest-${{ env.CACHE_KEY }}-${{ github.run_id }}
          restore-keys: |
            base-digest-${{ env.CACHE_KEY }}-

      - name: Check if base image changed
        id: check
        run: |
          CACHED_DIGEST=""
          if [ -f base_digest_${{ env.CACHE_KEY }}.txt ]; then
            CACHED_DIGEST=$(cat base_digest_${{ env.CACHE_KEY }}.txt)
          fi
          CURRENT_DIGEST="${{ steps.base_digest.outputs.digest }}"
          echo "Cached digest: $CACHED_DIGEST"
          echo "Current digest: $CURRENT_DIGEST"
          if [ "$CACHED_DIGEST" != "$CURRENT_DIGEST" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Build and push multi-arch image
        if: steps.check.outputs.changed == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ env.TARGET_IMAGE }}
          platforms: linux/amd64,linux/arm64
          build-args: |
            BASE_IMAGE=${{ env.BASE_IMAGE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update cached digest
        if: steps.check.outputs.changed == 'true'
        run: |
          echo "${{ steps.base_digest.outputs.digest }}" > base_digest_${{ env.CACHE_KEY }}.txt

      - name: Save cache
        if: steps.check.outputs.changed == 'true'
        uses: actions/cache@v4
        with:
          path: base_digest_${{ env.CACHE_KEY }}.txt
          key: base-digest-${{ env.CACHE_KEY }}-${{ github.run_id }}
